name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller ^
            --clean ^
            --onefile ^
            --noconsole ^
            --paths=src ^
            --name=TrackLyrics-${{ github.ref_name }} ^
            --collect-all PySide6 ^
            --distpath release ^
            --workpath build ^
            --specpath release ^
            src\main.py

      - name: Prepare package
        run: |
          mkdir package
          copy release\TrackLyrics-*.exe package\
          copy README.md package\

      - name: Create ZIP
        run: |
          powershell Compress-Archive -Path package\* -DestinationPath TrackLyrics-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TrackLyrics ${{ github.ref_name }}
          body: |
            ### This release includes:
            - **TrackLyrics-${{ github.ref_name }}.exe** — single-file build (Windows)
            - **TrackLyrics-${{ github.ref_name }}.zip** — exe + README


            ### Changelog:


            
            **How to use:**
            1. Download and extract the .zip, or use the .exe directly.
            2. The config file is auto-generated on first run.
            3. Select Bash executable path.
            4. Select project path.
            5. Done!
          files: |
            release/TrackLyrics-${{ github.ref_name }}.exe
            TrackLyrics-${{ github.ref_name }}.zip
